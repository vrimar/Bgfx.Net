name: sync-upstream

on:
  workflow_dispatch:
  schedule:
    # Mondays 08:00 UTC. bgfx commits multiple times per day; weekly rollup
    # gives one tidy PR with a `git log --oneline` of what changed.
    - cron: '0 8 * * MON'

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump submodules and regenerate bindings
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Record previous SHAs
        id: prev
        run: |
          {
            echo "bgfx=$(git -C external/bgfx rev-parse HEAD)"
            echo "bx=$(git -C external/bx rev-parse HEAD)"
            echo "bimg=$(git -C external/bimg rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Update submodules to latest origin
        run: |
          git submodule update --remote --merge external/bgfx external/bx external/bimg

      - name: Show upstream changes
        env:
          PREV_BGFX: ${{ steps.prev.outputs.bgfx }}
          PREV_BX:   ${{ steps.prev.outputs.bx }}
          PREV_BIMG: ${{ steps.prev.outputs.bimg }}
        run: |
          for sub in bgfx bx bimg; do
              prev_var="PREV_${sub^^}"
              prev="${!prev_var}"
              echo "=== $sub: $prev -> $(git -C external/$sub rev-parse HEAD) ==="
              git -C external/$sub log --oneline "$prev..HEAD" | head -50
          done

      - name: Regenerate bindings
        run: |
          pwsh -NoProfile -File build/sync-bindings.ps1
          pwsh -NoProfile -File build/run-generator.ps1

      - name: Build to confirm bindings still compile
        run: dotnet build Bgfx.Net.sln -c Release -p:SkipNativeWarning=true

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/sync-upstream
          title: 'bump: sync bgfx + bx + bimg submodules'
          commit-message: |
            sync: bgfx + bx + bimg submodule bump

            Auto-generated by .github/workflows/sync-upstream.yml.
            Regenerated src/Bgfx.Net/Generated/bgfx.{raw,g}.cs and
            updated AssemblyMetadata("BgfxRevision", ...) to the new pin.
          body: |
            Weekly upstream sync.

            ## Changes

            - bgfx: `${{ steps.prev.outputs.bgfx }}` -> new HEAD
            - bx:   `${{ steps.prev.outputs.bx }}`   -> new HEAD
            - bimg: `${{ steps.prev.outputs.bimg }}` -> new HEAD

            See workflow run output for `git log` since the previous pin.
            Reviewer: audit `bgfx.g.cs` for renamed/removed signatures that may
            break hand-written companions in `src/Bgfx.Net/Extensions/`.
          labels: |
            bot
            dependencies
            upstream-sync
